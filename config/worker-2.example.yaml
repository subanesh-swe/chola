worker_id: "worker-b"
hostname: "build-node-2"
http_port: 8082

controller:
  address: "http://localhost:50051"

resources:
  total_cpu: 16
  total_memory_gb: 128
  total_disk_gb: 500
  disk_type: "nvme"

capabilities:
  supported_job_types:
    - "common"
    - "heavy"
    - "nix"
    - "test"
  docker_enabled: true

heartbeat:
  interval_secs: 3

# Path resolution: $CHOLA_HOME > $XDG_DATA_HOME/chola > ~/.local/share/chola
execution: {}

logging:
  level: "info"

# Auth token (create at http://controller:3000/tokens)
#   chola_wkr_ = worker token (Worker Tokens tab)
#   chola_reg_ = registration token (one-time, legacy)
# Or set CHOLA_TOKEN env var
# token: "chola_wkr_xxxxxxxx..."