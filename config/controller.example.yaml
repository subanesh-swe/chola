bind_address: "0.0.0.0:50051"
http_port: 8080

# Optional TLS for the REST API (HTTP server). Leave commented out for plain HTTP (dev).
# For production with auth enabled: configure http_tls OR use a reverse proxy (nginx) with TLS.
# Without TLS, credentials and tokens are transmitted in plaintext.
# http_tls:
#   enabled: true
#   server_cert: "/etc/chola/certs/server.crt"
#   server_key: "/etc/chola/certs/server.key"

storage:
  postgres:
    host: localhost
    port: 5432
    database: choladb
    user: chola_app
    password: chola_app_secret
    max_connections: 10
    schema: chola

redis:
  host: localhost
  port: 6379
  key_prefix: "chola:"

scheduling:
  strategy: "best-fit"
  nvme_preference: true
  branch_affinity: true

workers:
  heartbeat_interval_secs: 3
  heartbeat_timeout_secs: 10
  max_reconnect_attempts: 5

auth:
  enabled: true
  jwt_secret: "change-me-in-production-use-a-long-random-string"
  jwt_expiry_secs: 86400
  default_admin_username: "admin"
  default_admin_password: "changeme"
  # AES-256-GCM key for encrypting secret pipeline variables at rest.
  # Omit to store plaintext (backward compatible).
  # encryption_key: "change-me-32-char-secret-key-here"

retention:
  max_age_days: 90
  max_builds_per_repo: 500
  cleanup_interval_secs: 3600

logging:
  level: "info"
  log_dir: "logs/"