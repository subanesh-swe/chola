bind_address: "0.0.0.0:50051"
http_port: 8080

storage:
  postgres:
    host: localhost
    port: 5432
    database: choladb
    user: chola_app
    password: chola_app_secret
    max_connections: 10
    schema: chola

redis:
  host: localhost
  port: 6379
  key_prefix: "chola:"

scheduling:
  strategy: "best-fit"
  nvme_preference: true
  branch_affinity: true

workers:
  heartbeat_interval_secs: 3
  heartbeat_timeout_secs: 10
  max_reconnect_attempts: 5

auth:
  enabled: true
  jwt_secret: "change-me-in-production-use-a-long-random-string"
  jwt_expiry_secs: 86400
  default_admin_username: "admin"
  default_admin_password: "changeme"

logging:
  level: "info"
  log_dir: "logs/"